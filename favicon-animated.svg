<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FFA500" />
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="20" fill="#0A0A0F" />

  <!-- Pulsing dot that expands into "KI" -->
  <g filter="url(#glow)">
    <!-- Dot phase (small circle, then expands to text) -->
    <circle cx="50" cy="50" r="5" fill="url(#goldGrad)">
      <animate attributeName="r" values="5;8;35;35;5" keyTimes="0;0.2;0.5;0.8;1" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;1;1;1;1" dur="3s" repeatCount="indefinite" />
    </circle>

    <!-- "KI" text (starts invisible, fades in as dot expands) -->
    <text x="50" y="68" font-family="'Inter', 'Segoe UI', sans-serif" font-size="42" font-weight="800" letter-spacing="3" text-anchor="middle" fill="url(#goldGrad)" opacity="0">
      KI
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.55;0.85;1" dur="3s" repeatCount="indefinite" />
    </text>
  </g>
</svg>
